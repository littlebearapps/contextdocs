name: docs

on:
  pull_request:
    paths:
      - '**.md'
      - 'docs/**'
      - 'llms.txt'
      - 'upstream-versions.json'
      - '.claude/**'
      - 'commands/**'
      - 'hooks/**'
      - 'tests/**'
  schedule:
    # 15th of each month at 9am UTC (staggered from check-upstream on the 1st)
    - cron: '0 9 15 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: '**/*.md'

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --exclude-private
            --no-progress
            --exclude "https://img.shields.io"
            --exclude "https://shields.io"
            --exclude "https://codex.openai.com"
            --exclude "https://www.npmjs.com"
            --exclude "https://github.com/littlebearapps/contextdocs/compare/"
            docs/
            README.md
            CONTRIBUTING.md
            CHANGELOG.md
            AGENTS.md
            llms.txt
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate evaluations.json
        run: python3 -m json.tool tests/evaluations.json > /dev/null

      - name: Validate skill frontmatter
        run: |
          errors=0
          for f in .claude/skills/*/SKILL.md; do
            # Check file starts with YAML frontmatter
            if ! head -1 "$f" | grep -q "^---"; then
              echo "ERROR: $f — missing YAML frontmatter"
              errors=$((errors + 1))
              continue
            fi
            # Check required fields: name, description
            frontmatter=$(sed -n '/^---$/,/^---$/p' "$f" | head -20)
            if ! echo "$frontmatter" | grep -q "^name:"; then
              echo "ERROR: $f — missing 'name' in frontmatter"
              errors=$((errors + 1))
            fi
            if ! echo "$frontmatter" | grep -q "^description:"; then
              echo "ERROR: $f — missing 'description' in frontmatter"
              errors=$((errors + 1))
            fi
          done
          echo "Checked $(find .claude/skills -name 'SKILL.md' | wc -l) skill files"
          [ "$errors" -eq 0 ] && echo "All skills valid" || exit 1

      - name: Validate command frontmatter
        run: |
          errors=0
          for f in commands/*.md; do
            if ! head -1 "$f" | grep -q "^---"; then
              echo "ERROR: $f — missing YAML frontmatter"
              errors=$((errors + 1))
              continue
            fi
            frontmatter=$(sed -n '/^---$/,/^---$/p' "$f" | head -10)
            if ! echo "$frontmatter" | grep -q "description:"; then
              echo "ERROR: $f — missing 'description' in frontmatter"
              errors=$((errors + 1))
            fi
          done
          echo "Checked $(ls commands/*.md | wc -l) command files"
          [ "$errors" -eq 0 ] && echo "All commands valid" || exit 1

      - name: Validate hook scripts
        run: |
          errors=0
          for f in hooks/*.sh; do
            # Check file starts with shebang
            if ! head -1 "$f" | grep -q "^#!/"; then
              echo "ERROR: $f — missing shebang line"
              errors=$((errors + 1))
            fi
            # Check bash syntax
            if ! bash -n "$f" 2>/dev/null; then
              echo "ERROR: $f — bash syntax error"
              errors=$((errors + 1))
            fi
          done
          echo "Checked $(ls hooks/*.sh | wc -l) hook scripts"
          [ "$errors" -eq 0 ] && echo "All hooks valid" || exit 1

      - name: Validate upstream-versions.json
        run: python3 -m json.tool upstream-versions.json > /dev/null

      - name: Validate plugin.json
        run: |
          python3 -m json.tool .claude-plugin/plugin.json > /dev/null
          # Check required fields
          for field in name version description; do
            if ! python3 -c "import json; d=json.load(open('.claude-plugin/plugin.json')); assert '$field' in d, 'missing $field'"; then
              echo "ERROR: plugin.json — missing '$field'"
              exit 1
            fi
          done
          echo "plugin.json valid"
